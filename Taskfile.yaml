version: "3"

vars:
  HOST:
    sh: hostname -s
  USER:
    sh: echo ${SUDO_USER:-$(whoami)}
  NIXOS_HOST:
    sh: |
      h=$(hostname -s)
      a=$(uname -m | sed 's/arm64/aarch64/')
      if grep -q "\"${h}-${a}\"" flake.nix 2>/dev/null; then
        echo "${h}-${a}"
      else
        echo "$h"
      fi

includes:
  nix:
    taskfile: ./taskfiles/nix
    dir: .
  vm:
    taskfile: ./taskfiles/vm
    dir: .
  secrets:
    taskfile: ./taskfiles/secrets
    dir: .
  toolchains:
    taskfile: ./taskfiles/toolchains
    dir: .
  lima:
    taskfile: ./taskfiles/lima
    dir: .

tasks:
  default:
    cmd: task -l

  switch:
    desc: Apply nix config for the current host
    cmds:
      - task: _switch-nh
        if: "command -v nh &>/dev/null"
      - task: _switch-direct
        if: "! command -v nh &>/dev/null"

  _switch-nh:
    internal: true
    cmds:
      - cmd: 'nh darwin switch . -H "{{.USER}}@{{.HOST}}"'
        platforms: [darwin]
      - cmd: 'nh os switch . -H "{{.NIXOS_HOST}}"'
        platforms: [linux]
        if: "[ -f /etc/NIXOS ]"
      - cmd: 'nh home switch . -H "{{.USER}}@{{.HOST}}"'
        platforms: [linux]
        if: "[ ! -f /etc/NIXOS ]"

  _switch-direct:
    internal: true
    cmds:
      - cmd: 'sudo darwin-rebuild switch --flake ".#{{.USER}}@{{.HOST}}"'
        platforms: [darwin]
      - cmd: 'sudo nixos-rebuild switch --flake ".#{{.NIXOS_HOST}}"'
        platforms: [linux]
        if: "[ -f /etc/NIXOS ]"
      - cmd: 'home-manager switch --flake ".#{{.USER}}@{{.HOST}}"'
        platforms: [linux]
        if: "[ ! -f /etc/NIXOS ]"

  update:
    desc: Update all flake inputs and show what changed
    cmds:
      - nix flake update
      - git diff flake.lock

  update:input:
    desc: Update a single flake input and show what changed
    cmds:
      - nix flake update {{.CLI_ARGS}}
      - git diff flake.lock

  update:reviewed:
    desc: Update flake inputs one at a time with per-input diffs and confirmation
    cmds:
      - |
        for input in $(nix flake metadata --json | jq -r '.locks.nodes.root.inputs | keys[]'); do
          # Skip narHash-pinned inputs (use update:pinned for those)
          if grep -A3 "\"$input\"" flake.nix | grep -q 'narHash='; then
            echo "=== Skipping $input (narHash-pinned, use 'task update:pinned -- $input') ==="
            echo
            continue
          fi
          echo "=== Updating $input ==="
          nix flake update "$input"
          if git diff --quiet flake.lock; then
            echo "  (no changes)"
          else
            git diff flake.lock
            echo
            read -rp "Stage flake.lock for $input? [y/N] " answer
            if [[ "$answer" =~ ^[Yy]$ ]]; then
              git add flake.lock
              echo "  Staged."
            else
              git checkout -- flake.lock
              echo "  Reverted."
            fi
          fi
          echo
        done

  update:pinned:
    desc: Update a narHash-pinned flake input (updates both flake.lock and flake.nix)
    cmds:
      - |
        INPUT="{{.CLI_ARGS}}"
        if [ -z "$INPUT" ]; then
          echo "Usage: task update:pinned -- <input-name>"
          exit 1
        fi
        if ! grep -A3 "\"$INPUT\"" flake.nix | grep -q 'narHash='; then
          echo "Error: $INPUT does not have a narHash pin in flake.nix"
          exit 1
        fi
        # Step 1: Strip narHash query param from this input's URL to allow fresh fetch
        sed -i'' -E "/\"$INPUT\"/,/\};/{/url =/s|\?narHash=sha256-[^\"%]*%3D||;}" flake.nix
        # Step 2: Update the input
        echo "=== Updating $INPUT ==="
        if ! nix flake update "$INPUT"; then
          echo "Update failed, restoring flake.nix"
          git checkout -- flake.nix
          exit 1
        fi
        if git diff --quiet flake.lock; then
          echo "No changes for $INPUT"
          git checkout -- flake.nix
          exit 0
        fi
        # Step 3: Extract new narHash and re-pin in flake.nix URL
        NEW_HASH=$(jq -r ".nodes[\"$INPUT\"].locked.narHash" flake.lock)
        ENCODED_HASH=$(echo "$NEW_HASH" | sed 's/=$/%3D/')
        # Find the URL line for this input and append narHash param
        sed -i'' -E "/\"$INPUT\"/,/\};/{/url =/s|(\";)|?narHash=$ENCODED_HASH\1|;}" flake.nix
        echo "Pinned $INPUT to narHash: $NEW_HASH"
        echo
        git diff flake.nix flake.lock

  brew:upgrade:
    desc: Manually upgrade all Homebrew packages
    platforms: [darwin]
    cmds:
      - brew upgrade

  check:
    desc: Run all Dagger checks
    cmds:
      - dagger check

  publish:
    desc: Build and publish dev container to GHCR
    vars:
      TAG: '{{.TAG | default "latest"}}'
      PLATFORMS: '{{.PLATFORMS | default "linux/amd64,linux/arm64"}}'
    cmds:
      - >-
        dagger call dev publish-shell
        --password env://GITHUB_TOKEN
        --tags "{{.TAG}}"
        --platforms "{{.PLATFORMS}}"

  dev:
    desc: Launch an interactive dev container
    cmds:
      - >-
        sops exec-env secrets/dotfiles.yaml '
        dagger call dev shell
        --repo-source .
        --git-config ~/.config/git
        --tz "{{.TZ | default "America/New_York"}}"
        --colorterm "{{.COLORTERM}}"
        --kagi-api-key env://KAGI_API_KEY
        --interactive'

  sandbox:
    desc: Launch an interactive dev container with network firewall
    cmds:
      - >-
        sops exec-env secrets/dotfiles.yaml '
        dagger call dev sandbox
        --git-config ~/.config/git
        --tz "{{.TZ | default "America/New_York"}}"
        --colorterm "{{.COLORTERM}}"
        --kagi-api-key env://KAGI_API_KEY
        --interactive'
