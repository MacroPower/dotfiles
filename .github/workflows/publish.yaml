name: publish

on:
  push:
    branches:
      - master

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
          image: tonistiigi/binfmt:qemu-v10.2.1

      - name: Publish dev container via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.3"
          call: >-
            dev publish-shell
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/shell"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  publish-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
          image: tonistiigi/binfmt:qemu-v10.2.1

      - name: Publish sandbox container via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.3"
          call: >-
            dev publish-sandbox
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/sandbox"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
