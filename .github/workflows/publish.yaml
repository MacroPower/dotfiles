name: publish

on:
  push:
    branches:
      - master

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-shell:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: amd64
            runs-on: ubuntu-latest
          - platform: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build dev container via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.6"
          call: >-
            dev publish-shell
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/shell"
            --platforms="linux/${{ matrix.platform }}"
            --tags="${{ github.sha }}-${{ matrix.platform }}"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  publish-shell:
    needs: build-shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Assemble multi-arch manifest via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.6"
          call: >-
            dev publish-manifest
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/shell"
            --refs="ghcr.io/macropower/shell:${{ github.sha }}-amd64,ghcr.io/macropower/shell:${{ github.sha }}-arm64"
            --platforms="linux/amd64,linux/arm64"
            --tags="latest,${{ github.sha }}"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  build-sandbox:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: amd64
            runs-on: ubuntu-latest
          - platform: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build sandbox container via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.6"
          call: >-
            dev publish-sandbox
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/sandbox"
            --platforms="linux/${{ matrix.platform }}"
            --tags="${{ github.sha }}-${{ matrix.platform }}"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  publish-sandbox:
    needs: build-sandbox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Assemble multi-arch manifest via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.6"
          call: >-
            dev publish-manifest
            --password=env://REGISTRY_PASSWORD
            --image="ghcr.io/macropower/sandbox"
            --refs="ghcr.io/macropower/sandbox:${{ github.sha }}-amd64,ghcr.io/macropower/sandbox:${{ github.sha }}-arm64"
            --platforms="linux/amd64,linux/arm64"
            --tags="latest,${{ github.sha }}"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
