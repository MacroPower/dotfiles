version: "3"

tasks:
  upload-key:
    desc: Upload local SSH public key to GitHub
    vars:
      HOST:
        sh: hostname -s
      KEY_FILE: '{{.KEY_FILE | default "~/.ssh/id_ed25519.pub"}}'
      KEY_TITLE: '{{.KEY_TITLE | default "{{.HOST}}"}}'
    cmds:
      - gh ssh-key add {{.KEY_FILE}} --title "{{.KEY_TITLE}}"
