# Lima VM template for Terrarium (NixOS + network firewall).
#
# This template uses a golden image built with `task lima:image`.
# The image has the full NixOS configuration baked in, so no
# provisioning step is needed.
#
# Usage:
#   task lima:image   # build the golden qcow2 (requires Linux builder)
#   task lima:pull    # pull a pre-built image from GHCR (no builder needed)
#   task lima:create  # create and start the VM
#   task lima:rebuild # apply configuration changes without rebuilding the image
#   task lima:destroy # stop and delete the VM

# Placeholder image; lima:create overrides via --set with the local
# golden image path for the host architecture.
images:
  - location: ""
    arch: "aarch64"
  - location: ""
    arch: "x86_64"

cpus: 2
memory: 2GiB
disk: 20GiB

env:
  TERRARIUM_CONFIG: "/etc/terrarium/config.yaml"
