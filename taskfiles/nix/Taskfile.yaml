version: "3"

tasks:
  lint:
    desc: Check formatting and lint (nixfmt, deadnix, statix via treefmt)
    cmds:
      - dagger check nix:lint

  format:
    desc: Apply all auto-fixes (formatting and lint via treefmt)
    cmds:
      - dagger call nix format -y

  build:
    desc: Evaluate all host configurations
    cmds:
      - dagger check nix:build

  build:home:
    desc: Evaluate all home-manager configurations
    cmds:
      - dagger check nix:build-home

  flake-check:
    desc: Validate flake schema
    cmds:
      - dagger check nix:flake-check

  pkg:update:
    desc: Update custom package derivations in pkgs/
    cmds:
      - bash pkgs/chief-update.sh
