version: "3"

vars:
  SSH_KEY: '{{.SSH_KEY | default "~/.ssh/id_ed25519"}}'
  AGE_KEY_DIR: ~/.config/sops/age
  AGE_KEY_FILE: "{{.AGE_KEY_DIR}}/keys.txt"

tasks:
  init:
    desc: Derive an age key from SSH key for sops secret decryption
    status:
      - test -f {{.AGE_KEY_FILE}}
    cmds:
      - mkdir -p {{.AGE_KEY_DIR}}
      - >-
        nix shell nixpkgs#ssh-to-age --command
        sh -c 'ssh-to-age -private-key -i {{.SSH_KEY}} > {{.AGE_KEY_FILE}}'
      - chmod 600 {{.AGE_KEY_FILE}}
      - cmd: |
          echo ""
          echo "Age key created at {{.AGE_KEY_FILE}}"
          echo ""
          echo "Your age public key:"
          nix shell nixpkgs#ssh-to-age --command sh -c 'ssh-to-age -i {{.SSH_KEY}}.pub'
          echo ""
          echo "Add this public key to .sops.yaml in the repo root."
        silent: true

  sync:
    desc: Pull secrets from Doppler and encrypt into sops YAML
    deps: [init]
    vars:
      SECRETS_DIR: secrets
      SECRETS_FILE: "{{.SECRETS_DIR}}/dotfiles.yaml"
      TMP_FILE: "{{.SECRETS_DIR}}/.doppler-tmp.json"
      AGE_PUBLIC_KEY:
        sh: nix shell nixpkgs#ssh-to-age --command sh -c 'ssh-to-age -i {{.SSH_KEY}}.pub'
    preconditions:
      - sh: test -f .sops.yaml
        msg: ".sops.yaml not found in repo root. Create it first (see US-005)."
      - sh: doppler me >/dev/null 2>&1
        msg: "Doppler not authenticated. Run 'doppler login' first."
    cmds:
      - mkdir -p {{.SECRETS_DIR}}
      - >-
        doppler secrets download -p dotfiles -c nix --format json --no-file
        > {{.TMP_FILE}}
      - defer: rm -f {{.TMP_FILE}}
      - >-
        nix shell nixpkgs#sops --command
        sops encrypt --age {{.AGE_PUBLIC_KEY}} --input-type json --output-type yaml
        --filename-override {{.SECRETS_FILE}} {{.TMP_FILE}} > {{.SECRETS_FILE}}.tmp
      - mv {{.SECRETS_FILE}}.tmp {{.SECRETS_FILE}}
      - cmd: echo "Secrets synced to {{.SECRETS_FILE}}"
        silent: true

  edit:
    desc: Edit decrypted secrets in your editor
    deps: [init]
    cmds:
      - sops secrets/dotfiles.yaml
