version: "3"

vars:
  VM_NAME: '{{.VM_NAME | default "nixos-orbstack"}}'
  VM_USER: '{{.VM_USER | default "jacobcolvin"}}'
  VM_FLAKE_DIR: /tmp/dotfiles
  AGE_KEY_FILE: ~/.config/sops/age/keys.txt
  VM_AGE_KEY_DIR: /home/{{.VM_USER}}/.config/sops/age

tasks:
  init-secrets:
    desc: Copy age key into the VM for sops secret decryption
    preconditions:
      - sh: test -f {{.AGE_KEY_FILE}}
        msg: "Age key not found at {{.AGE_KEY_FILE}}. Run 'task secrets:init' first."
    status:
      - >-
        orb run -m {{.VM_NAME}}
        test -f {{.VM_AGE_KEY_DIR}}/keys.txt
    cmds:
      - >-
        orb run -m {{.VM_NAME}}
        mkdir -p {{.VM_AGE_KEY_DIR}}
      - >-
        cat {{.AGE_KEY_FILE}} |
        orb run -m {{.VM_NAME}}
        sh -c 'cat > {{.VM_AGE_KEY_DIR}}/keys.txt && chmod 600 {{.VM_AGE_KEY_DIR}}/keys.txt'

  init-nix:
    desc: Ensure git is available in the VM for flake fetching
    status:
      - >-
        orb run -m {{.VM_NAME}} -u root
        command -v git
    cmds:
      - >-
        orb run -m {{.VM_NAME}} -u root
        nix-env -iA nixos.git

  create:
    desc: Create and configure a new OrbStack NixOS VM
    cmds:
      - orb create nixos:unstable {{.VM_NAME}}
      - >-
        tar --no-xattrs -cf - . |
        orb run -m {{.VM_NAME}} -u root
        sh -c 'rm -rf {{.VM_FLAKE_DIR}} && mkdir -p {{.VM_FLAKE_DIR}} && tar -xf - -C {{.VM_FLAKE_DIR}}'
      - >-
        orb run -m {{.VM_NAME}} -u root
        sh -c 'mkdir -p /root && printf "[safe]\n\tdirectory = {{.VM_FLAKE_DIR}}\n" > /root/.gitconfig'
      - task: init-secrets
      - task: init-nix
      - >-
        orb run -m {{.VM_NAME}} -u root
        nixos-rebuild switch --impure
        --flake '{{.VM_FLAKE_DIR}}#{{.VM_NAME}}'

  switch:
    desc: Apply NixOS config to an existing OrbStack VM
    deps: [init-secrets, init-nix]
    cmds:
      - >-
        tar --no-xattrs -cf - . |
        orb run -m {{.VM_NAME}} -u root
        sh -c 'rm -rf {{.VM_FLAKE_DIR}} && mkdir -p {{.VM_FLAKE_DIR}} && tar -xf - -C {{.VM_FLAKE_DIR}}'
      - >-
        orb run -m {{.VM_NAME}} -u root
        sh -c 'mkdir -p /root && printf "[safe]\n\tdirectory = {{.VM_FLAKE_DIR}}\n" > /root/.gitconfig'
      - >-
        orb run -m {{.VM_NAME}} -u root
        nixos-rebuild switch --impure
        --flake '{{.VM_FLAKE_DIR}}#{{.VM_NAME}}'

  delete:
    desc: Delete an OrbStack NixOS VM
    cmds:
      - orb delete {{.VM_NAME}} --force
